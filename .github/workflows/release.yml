name: Build release images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # Only build amd64 images (for Windows tester) to avoid disk space issues
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Create manylinux wheelhouse
        run: |
          mkdir -p ocr_service/wheelhouse
          python -m pip download -r ocr_service/requirements.txt -d ocr_service/wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: ocr_service/wheelhouse

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          docker system prune -af --volumes
          df -h

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push OCR - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f ocr_service/Dockerfile \
            -t ghcr.io/gustosrepo/medocr-ocr:${{ steps.tag.outputs.TAG }} \
            -t ghcr.io/gustosrepo/medocr-ocr:latest \
            --push \
            ./ocr_service
          docker system prune -af

      - name: Build and push Backend - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t ghcr.io/gustosrepo/medocr-backend:${{ steps.tag.outputs.TAG }} \
            -t ghcr.io/gustosrepo/medocr-backend:latest \
            --push \
            .
          docker system prune -af

      - name: Build and push Frontend - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f frontend/Dockerfile \
            -t ghcr.io/gustosrepo/medocr-frontend:${{ steps.tag.outputs.TAG }} \
            -t ghcr.io/gustosrepo/medocr-frontend:latest \
            --push \
            ./frontend

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## MEDOCR Release ${{ github.ref_name }}
            
            Docker images are available at GitHub Container Registry:
            
            **Pull images:**
            ```bash
            docker pull ghcr.io/gustosrepo/medocr-ocr:${{ steps.tag.outputs.TAG }}
            docker pull ghcr.io/gustosrepo/medocr-backend:${{ steps.tag.outputs.TAG }}
            docker pull ghcr.io/gustosrepo/medocr-frontend:${{ steps.tag.outputs.TAG }}
            ```
            
            **Or use latest:**
            ```bash
            docker pull ghcr.io/gustosrepo/medocr-ocr:latest
            docker pull ghcr.io/gustosrepo/medocr-backend:latest
            docker pull ghcr.io/gustosrepo/medocr-frontend:latest
            ```

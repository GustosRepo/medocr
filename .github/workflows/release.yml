name: Build release images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # Only build amd64 images (for Windows tester) to avoid disk space issues
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Create manylinux wheelhouse
        run: |
          mkdir -p ocr_service/wheelhouse
          python -m pip download -r ocr_service/requirements.txt -d ocr_service/wheelhouse

      - name: Upload wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: ocr_service/wheelhouse

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          docker system prune -af --volumes
          df -h

      - name: Prepare output folders
        run: mkdir -p out

      - name: Build OCR - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f ocr_service/Dockerfile \
            --output type=tar,dest=out/medocr-ocr-amd64.tar \
            ./ocr_service
          docker system prune -af

      - name: Build Backend - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            --output type=tar,dest=out/medocr-backend-amd64.tar \
            .
          docker system prune -af

      - name: Build Frontend - amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f frontend/Dockerfile \
            --output type=tar,dest=out/medocr-frontend-amd64.tar \
            ./frontend

      - name: Upload amd64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medocr-amd64-images
          path: out/*.tar

      - name: Create GitHub Release and attach tars (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: out/*.tar
          body: |
            ## MEDOCR Release ${{ github.ref_name }}
            
            amd64 Docker images for Windows/Linux x86_64.
            
            **Load images:**
            ```bash
            docker load -i medocr-ocr-amd64.tar
            docker load -i medocr-backend-amd64.tar
            docker load -i medocr-frontend-amd64.tar
            ```

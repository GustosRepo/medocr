version: '3.8'
services:
  api:
    image: medocr-backend:local
    ports:
      - "4387:4387"
    env_file: .env
    volumes:
      - medocr-data:/usr/src/app/data
  ocr:
    image: medocr-ocr:local
    ports:
      - "8000:8000"
  frontend:
    image: medocr-frontend:local
    ports:
      - "5173:80"

volumes:
  medocr-data:

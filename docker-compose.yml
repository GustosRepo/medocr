version: '3.8'
services:
  api:
    image: medocr-backend:local
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4387:4387"
    environment:
      - NODE_ENV=development
    networks:
      - medocr-net

  ocr:
    image: medocr-ocr:local
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - medocr-net

  frontend:
    image: medocr-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - medocr-net

networks:
  medocr-net:
    driver: bridge
services:
	api:
		build:
			context: .
			dockerfile: Dockerfile.api
		image: medocr-api:latest
		env_file: .env
		environment:
			NODE_ENV: production
			OCR_SERVICE_URL: http://ocr:8000
			DOC_MAX_CONCURRENCY: 4
		depends_on:
			- ocr
		restart: unless-stopped
		ports:
			- "4387:4387"
		volumes:
			- ./data:/app/data
		networks:
			- default
	frontend:
		build:
			context: ./frontend
			dockerfile: Dockerfile.frontend
		image: medocr-frontend:latest
		depends_on:
			- api
		restart: unless-stopped
		ports:
			- "8080:80"
		networks:
			- default
	ocr:
		build:
			context: .
			dockerfile: ocr_service/Dockerfile.ocr
		image: medocr-ocr:latest
		env_file: .env
		environment:
			MEDOCR_PREPROCESS_MODE: enhanced
			MEDOCR_RENDER_DPI: 300
		restart: unless-stopped
		ports:
			- "8000:8000"
		networks:
			- default

networks:
	default:
		name: medocr-net

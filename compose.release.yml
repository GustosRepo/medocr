# Production/Client compose file (no build contexts, versioned images)
# Usage: docker compose -f compose.release.yml --env-file .env up -d
services:
  api:
    image: medocr-api:0.1.0
    env_file: .env
    environment:
      NODE_ENV: production
      # Ensure OCR points to service hostname (overrides any localhost in .env)
      OCR_SERVICE_URL: http://ocr:8000
    depends_on:
      - ocr
    restart: unless-stopped
    ports:
      - "4387:4387"
    volumes:
      - medocr_data:/app/data
  frontend:
    image: medocr-frontend:0.1.0
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "8080:80"
  ocr:
    image: medocr-ocr:0.1.0
    env_file: .env
    environment:
      MEDOCR_PREPROCESS_MODE: enhanced
      MEDOCR_RENDER_DPI: 300
    restart: unless-stopped
    ports:
      - "8000:8000"
volumes:
  medocr_data:
    driver: local

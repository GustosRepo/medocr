<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>MEDOCR Analytics Dashboard</title><meta name="viewport" content="width=device-width,initial-scale=1"/><style>body{font-family:system-ui,Arial,sans-serif;margin:20px;background:#0f1115;color:#e8eaed}h1{margin:0 0 1rem;font-size:1.6rem}section{margin-bottom:2rem;padding:1rem;border:1px solid #2a2d33;border-radius:8px;background:#161a20}table{border-collapse:collapse;width:100%;font-size:0.85rem}th,td{border:1px solid #2d3138;padding:4px 6px;text-align:left}th{background:#1f242b}code{background:#222830;padding:2px 4px;border-radius:4px;color:#9cdcfe;font-size:0.8rem}small{color:#8aa0b4}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}.card{background:#1b2027;padding:0.75rem;border:1px solid #2a3038;border-radius:6px} .ok{color:#4caf50}.warn{color:#ffb300}.err{color:#ef5350} .mono{font-family:ui-monospace,Menlo,Consolas,monospace} .spark{height:30px;display:flex;align-items:flex-end;gap:2px} .spark span{flex:1;background:#394554} .spark span.v{background:#4caf50} .pill{display:inline-block;padding:2px 6px;border-radius:999px;font-size:0.65rem;background:#26313d;color:#9fb4c9;margin-right:4px;margin-bottom:2px} </style></head><body><h1>MEDOCR Analytics</h1><div id="lastUpdated" style="margin-bottom:1rem;font-size:0.75rem;opacity:.8"></div><div class="grid" id="cards"></div><section><h2>Feedback Suggestions</h2><div id="suggestions"></div></section><section><h2>Recent Snapshots</h2><table id="snapshotsTbl"><thead><tr><th>Doc</th><th>CPT</th><th>Amb</th><th>Conf</th></tr></thead><tbody></tbody></table></section><section><h2>Metrics Detail</h2><pre id="raw" style="white-space:pre-wrap;font-size:0.7rem;background:#12161b;padding:8px;border-radius:6px;max-height:320px;overflow:auto"></pre></section><script>async function fetchData(){const r=await fetch('/api/analytics');if(!r.ok)return;const data=await r.json();render(data);}function fmt(n){if(n==null)return '-';return typeof n==='number'?Number(n).toFixed(2):n}function render(d){document.getElementById('lastUpdated').textContent='Last Updated: '+new Date().toLocaleTimeString();const cards=[{label:'Docs Processed',value:d.metrics.docsProcessed},{label:'Errors',value:d.metrics.docsErrored},{label:'Manual Correction Rate',value:fmt(d.derived.manualCorrectionRate*100)+'%'},{label:'Amb CPT Rate',value:fmt(d.derived.ambiguousCptRate*100)+'%'},{label:'Confidence Drift',value:d.confidenceDrift?fmt(d.confidenceDrift.pct*100)+'%':'- ',status:d.confidenceDriftAlert?d.confidenceDriftAlert.level:'ok'},{label:'Acceptance Rate',value:fmt(d.feedback.acceptanceRate*100)+'%'},{label:'Max OCR Concurrency',value:d.concurrency?.maxConcurrentOcr}];document.getElementById('cards').innerHTML=cards.map(c=>`<div class='card'><div style='font-size:.65rem;opacity:.7'>${c.label}</div><div class='mono ${c.status||''}' style='font-size:1.1rem;'>${c.value}</div></div>`).join('');document.getElementById('suggestions').innerHTML=d.feedback.suggestions.length?d.feedback.suggestions.map(s=>`<div class='card'><strong>${s.path}</strong><br/><span class='pill'>${s.suggestedValue}</span> <small>${s.occurrences}x accepted</small></div>`).join(''):'<small>No suggestions yet</small>';const tb=document.querySelector('#snapshotsTbl tbody');tb.innerHTML=(d.snapshots?.recent||[]).map(s=>`<tr><td>${s.docId}</td><td>${s.cpt||'-'}</td><td>${s.ambiguous?'✔':''}</td><td>${fmt(s.confidence)}</td></tr>`).join('');document.getElementById('raw').textContent=JSON.stringify(d,null,2);}fetchData();setInterval(fetchData,5000);</script></body></html>

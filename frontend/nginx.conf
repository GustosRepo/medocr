server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Simple SPA routing
  location / {
    try_files $uri /index.html;
  }

  # API proxy (adjust if domain differs)
  location /api/ {
    proxy_pass http://api:4387/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /dashboard {
    proxy_pass http://api:4387/dashboard;
  }

  # Static assets served directly
  location /static/ {
    proxy_pass http://api:4387/static/;
  }
}

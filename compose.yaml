# Duplicate compose file (compose.yaml) for Docker Compose V2 discovery
# Mirrors docker-compose.yml
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: medocr-api:latest
    env_file: .env
    environment:
      NODE_ENV: production
      OCR_SERVICE_URL: http://ocr:8000
      DOC_MAX_CONCURRENCY: 4
    depends_on:
      - ocr
    restart: unless-stopped
    ports:
      - "4387:4387"
    volumes:
      - ./data:/app/data
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    image: medocr-frontend:latest
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "8080:80"
  ocr:
    build:
      context: .
      dockerfile: ocr_service/Dockerfile.ocr
    image: medocr-ocr:latest
    env_file: .env
    environment:
      MEDOCR_PREPROCESS_MODE: enhanced
      MEDOCR_RENDER_DPI: 300
    restart: unless-stopped
    ports:
      - "8000:8000"

networks:
  default:
    name: medocr-net
